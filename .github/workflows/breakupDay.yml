name: Update Counter

on:
  schedule:https://github.com/hoiino/breakup-day-counter2/blob/main/.github/workflows/breakupDay.yml
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calculate days and generate SVG
        run: |
          START="2025-11-11"
          TODAY=$(date +%Y-%m-%d)
          DAYS=$(( ( $(date -d "$TODAY" +%s) - $(date -d "$START" +%s) ) / 86400 + 1 ))

          cat <<EOF > counter.svg
<svg xmlns="http://www.w3.org/2000/svg" width="170" height="100" viewBox="0 0 170 100">
  <rect x="1" y="1" width="168" height="98" rx="14" ry="14" fill="#F4F5F3" stroke="#8F938E" stroke-width="2"/>

  <text x="85" y="32"
        text-anchor="middle"
        font-family="Malgun Gothic, sans-serif"
        font-size="12"
        fill="#5E615C">
        2025.11.11
  </text>

  <text x="85" y="60"
        text-anchor="middle"
        font-family="Malgun Gothic, sans-serif"
        font-size="30"
        font-weight="700"
        fill="#2F312E">
        D+${DAYS}
  </text>

  <text x="85" y="82"
        text-anchor="middle"
        font-family="Malgun Gothic, sans-serif"
        font-size="10"
        fill="#7A7D78">
        breakup day
  </text>

</svg>
EOF

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add counter.svg
          git commit -m "update counter" || exit 0
          git push
