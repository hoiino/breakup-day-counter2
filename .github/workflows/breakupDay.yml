name: Update breakupDay

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update counter.svg
        run: |
          START="2025-11-11"
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          DAYS=$(( ( $(date -d "$TODAY" +%s) - $(date -d "$START" +%s) ) / 86400 + 1 ))

          echo '<svg xmlns="http://www.w3.org/2000/svg" width="170" height="100" viewBox="0 0 170 100">' > counter.svg
          echo '  <rect x="1" y="1" width="168" height="98" rx="14" ry="14" fill="#F4F5F3" stroke="#8F938E" stroke-width="2"/>' >> counter.svg
          echo '  <text x="85" y="32" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="12" fill="#5E615C">2025.11.11</text>' >> counter.svg
          echo "  <text x=\"85\" y=\"60\" text-anchor=\"middle\" font-family=\"Malgun Gothic, sans-serif\" font-size=\"30\" font-weight=\"700\" fill=\"#2F312E\">D+${DAYS}</text>" >> counter.svg
          echo '  <text x="85" y="82" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#7A7D78">breakup day</text>' >> counter.svg
          echo '</svg>' >> counter.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add counter.svg
          git commit -m "update counter" || exit 0
          git push
